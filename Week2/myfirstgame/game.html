<!DOCTYPE html>
<html>
        <head>
            <title>Solid Snake vs. Liquid Snake</title>
        </head>
            <style>
            @font-face {
        font-family: MGS2;
        src: url(MGS2.ttf)
    }
    </style>
    <body class="battle" style="background-color: grey;font-family: MGS2;font-weight:10;">
        <h1 id="liquid">LIQUID WANTS TO FIGHT YOU ON TOP OF METAL GEAR REX!</h1>
        <section class="liquid">
            <img src="liquid.png"></img>
            <h3>100/100 HP</h3>
        </section>
        <div style="background-color: green;"><p>&nbsp;</p></div>
        <section class="solid"></section>
            <img src="solid.png"></img>
            <ol>
                <li><button>FIGHT</button></li>
                <li><label id="item" for="item-select">ITEM</label>

                    <select id="item-select">
                        <option value="box">CARDBOARD BOX</option>
                        <option value="rations">RATIONS</option>
                        <option value="socom">SOCOM</option>
                        <option value="knife">KNIFE</option>
                    </select>

                </li>
                <li><button>USE ITEM</button></li>
                <li><button>CHECK</button></li>
                <li><button>FLEE</button></li>
            </ol>
    </body>
</html>
